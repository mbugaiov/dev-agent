name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: bash tests/run_tests.sh
      - run: bash scripts/portability_check.sh
      - run: bash scripts/projects_isolation_check.sh
