name: Auto-merge when green

# Squash-merge open PRs when CI + Code Review both succeed (mirrors app Bitbucket auto-merge).
on:
  workflow_run:
    workflows: [CI, "Code Review"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  auto-merge:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Merge PR when required checks are green
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const prs = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head: `${owner}:${run.head_branch}`,
              per_page: 1,
            });
            if (prs.data.length === 0) {
              core.info('No open PR for branch — skip');
              return;
            }

            // Re-fetch PR so head SHA is current; only merge the SHA this run tested.
            const pr = (
              await github.rest.pulls.get({
                owner,
                repo,
                pull_number: prs.data[0].number,
              })
            ).data;
            if (pr.draft) {
              core.info('Draft PR — skip auto-merge');
              return;
            }
            if (pr.head.sha !== run.head_sha) {
              core.info(
                `PR head ${pr.head.sha} !== run head ${run.head_sha} — skip (newer push pending)`,
              );
              return;
            }

            const required = ['test', 'review'];
            const { data: checks } = await github.rest.checks.listForRef({
              owner,
              repo,
              ref: run.head_sha,
              per_page: 100,
            });

            const byName = new Map();
            for (const c of checks.check_runs) {
              const prev = byName.get(c.name);
              if (!prev || (c.completed_at ?? '') > (prev.completed_at ?? '')) {
                byName.set(c.name, c);
              }
            }
            for (const name of required) {
              const check = byName.get(name);
              if (!check || check.conclusion !== 'success') {
                core.info(
                  `Required check "${name}" not success yet (${check?.conclusion ?? 'missing'}) — skip`,
                );
                return;
              }
            }

            try {
              await github.rest.pulls.merge({
                owner,
                repo,
                pull_number: pr.number,
                merge_method: 'squash',
                sha: run.head_sha,
              });
              core.info(`Auto-merged PR #${pr.number} (squash) at ${run.head_sha}`);
            } catch (err) {
              if (err.status === 405 || err.status === 409) {
                core.info(`PR #${pr.number} already merged or not mergeable`);
                return;
              }
              throw err;
            }
